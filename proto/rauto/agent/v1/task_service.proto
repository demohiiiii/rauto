syntax = "proto3";

package rauto.agent.v1;

service AgentTaskService {
  rpc GetAgentInfo(AgentInfoRequest) returns (AgentInfoResponse);
  rpc GetAgentStatus(AgentStatusRequest) returns (AgentStatusResponse);
  rpc ProbeDevices(ProbeDevicesRequest) returns (ProbeDevicesResponse);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc GetConnection(GetConnectionRequest) returns (JsonResponse);
  rpc UpsertConnection(UpsertConnectionRequest) returns (UpsertConnectionResponse);
  rpc DeleteConnection(DeleteConnectionRequest) returns (JsonResponse);
  rpc TestConnection(TestConnectionRequest) returns (TestConnectionResponse);
  rpc GetConnectionHistory(GetConnectionHistoryRequest) returns (JsonResponse);
  rpc GetConnectionHistoryDetail(GetConnectionHistoryDetailRequest) returns (JsonResponse);
  rpc DeleteConnectionHistory(DeleteConnectionHistoryRequest) returns (JsonResponse);
  rpc ListInventoryGroups(ListInventoryGroupsRequest) returns (JsonResponse);
  rpc GetInventoryGroup(GetInventoryGroupRequest) returns (JsonResponse);
  rpc UpsertInventoryGroup(UpsertInventoryGroupRequest) returns (JsonResponse);
  rpc DeleteInventoryGroup(DeleteInventoryGroupRequest) returns (JsonResponse);
  rpc ListInventoryLabels(ListInventoryLabelsRequest) returns (JsonResponse);
  rpc GetInventoryLabel(GetInventoryLabelRequest) returns (JsonResponse);
  rpc UpsertInventoryLabel(UpsertInventoryLabelRequest) returns (JsonResponse);
  rpc DeleteInventoryLabel(DeleteInventoryLabelRequest) returns (JsonResponse);
  rpc ImportConnections(ImportConnectionsRequest) returns (JsonResponse);
  rpc DownloadConnectionImportTemplate(DownloadConnectionImportTemplateRequest) returns (BytesResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc GetTemplate(GetTemplateRequest) returns (TemplateDetail);
  rpc CreateTemplate(CreateTemplateRequest) returns (TemplateDetail);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (TemplateDetail);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (JsonResponse);
  rpc ListCommandFlowTemplates(ListCommandFlowTemplatesRequest) returns (ListCommandFlowTemplatesResponse);
  rpc ListBuiltinCommandFlowTemplates(ListBuiltinCommandFlowTemplatesRequest) returns (ListCommandFlowTemplatesResponse);
  rpc GetCommandFlowTemplate(GetCommandFlowTemplateRequest) returns (CommandFlowTemplateDetail);
  rpc GetBuiltinCommandFlowTemplate(GetBuiltinCommandFlowTemplateRequest) returns (CommandFlowTemplateDetail);
  rpc UpsertCommandFlowTemplate(UpsertCommandFlowTemplateRequest) returns (CommandFlowTemplateDetail);
  rpc DeleteCommandFlowTemplate(DeleteCommandFlowTemplateRequest) returns (DeleteCommandFlowTemplateResponse);
  rpc ListTxBlockTemplates(ListTxBlockTemplatesRequest) returns (ListTemplatesResponse);
  rpc GetTxBlockTemplate(GetTemplateRequest) returns (TemplateDetail);
  rpc CreateTxBlockTemplate(CreateTemplateRequest) returns (TemplateDetail);
  rpc UpdateTxBlockTemplate(UpdateTemplateRequest) returns (TemplateDetail);
  rpc DeleteTxBlockTemplate(DeleteTemplateRequest) returns (JsonResponse);
  rpc ListTxWorkflowTemplates(ListTxWorkflowTemplatesRequest) returns (ListTemplatesResponse);
  rpc GetTxWorkflowTemplate(GetTemplateRequest) returns (TemplateDetail);
  rpc CreateTxWorkflowTemplate(CreateTemplateRequest) returns (TemplateDetail);
  rpc UpdateTxWorkflowTemplate(UpdateTemplateRequest) returns (TemplateDetail);
  rpc DeleteTxWorkflowTemplate(DeleteTemplateRequest) returns (JsonResponse);
  rpc ListOrchestrationTemplates(ListOrchestrationTemplatesRequest) returns (ListTemplatesResponse);
  rpc GetOrchestrationTemplate(GetTemplateRequest) returns (TemplateDetail);
  rpc CreateOrchestrationTemplate(CreateTemplateRequest) returns (TemplateDetail);
  rpc UpdateOrchestrationTemplate(UpdateTemplateRequest) returns (TemplateDetail);
  rpc DeleteOrchestrationTemplate(DeleteTemplateRequest) returns (JsonResponse);
  rpc ListDeviceProfiles(ListDeviceProfilesRequest) returns (ListDeviceProfilesResponse);
  rpc GetBuiltinProfileDetail(GetProfileRequest) returns (JsonResponse);
  rpc GetBuiltinProfileForm(GetProfileRequest) returns (JsonResponse);
  rpc GetCustomProfile(GetProfileRequest) returns (JsonResponse);
  rpc UpsertCustomProfile(UpsertCustomProfileRequest) returns (JsonResponse);
  rpc GetCustomProfileForm(GetProfileRequest) returns (JsonResponse);
  rpc UpsertCustomProfileForm(UpsertCustomProfileRequest) returns (JsonResponse);
  rpc DeleteCustomProfile(DeleteProfileRequest) returns (JsonResponse);
  rpc DiagnoseProfile(DiagnoseProfileRequest) returns (JsonResponse);
  rpc ListProfileModes(ListProfileModesRequest) returns (ListProfileModesResponse);
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse);
  rpc ListShowObjects(ListShowObjectsRequest) returns (ListShowObjectsResponse);
  rpc ExecuteShow(ExecuteShowRequest) returns (ExecuteShowResponse);
  rpc ExecuteShowBatch(ExecuteShowBatchRequest) returns (ExecuteShowBatchResponse);
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);
  rpc ExecuteCommandAsync(ExecuteCommandRequest) returns (AcceptedTaskResponse);
  rpc ExecuteTemplate(ExecuteTemplateRequest) returns (ExecuteTemplateResponse);
  rpc ExecuteTemplateAsync(ExecuteTemplateRequest) returns (AcceptedTaskResponse);
  rpc ExecuteCommandFlow(ExecuteCommandFlowRequest) returns (ExecuteCommandFlowResponse);
  rpc ExecuteUpload(ExecuteUploadRequest) returns (ExecuteUploadResponse);
  rpc ExecuteTxBlock(ExecuteTxBlockRequest) returns (ExecuteTxBlockResponse);
  rpc ExecuteTxBlockAsync(ExecuteTxBlockRequest) returns (AcceptedTaskResponse);
  rpc ExecuteTxWorkflow(ExecuteTxWorkflowRequest) returns (ExecuteTxWorkflowResponse);
  rpc ExecuteTxWorkflowAsync(ExecuteTxWorkflowRequest) returns (AcceptedTaskResponse);
  rpc ExecuteOrchestration(ExecuteOrchestrationRequest) returns (ExecuteOrchestrationResponse);
  rpc ExecuteOrchestrationAsync(ExecuteOrchestrationRequest) returns (AcceptedTaskResponse);
  rpc ReplaySession(ReplaySessionRequest) returns (JsonResponse);
  rpc ListTextfsmTemplates(ListTextfsmTemplatesRequest) returns (JsonResponse);
  rpc GetTextfsmTemplate(GetTextfsmTemplateRequest) returns (JsonResponse);
  rpc CreateTextfsmTemplate(UpsertTextfsmTemplateRequest) returns (JsonResponse);
  rpc UpdateTextfsmTemplate(UpsertTextfsmTemplateRequest) returns (JsonResponse);
  rpc DeleteTextfsmTemplate(DeleteTextfsmTemplateRequest) returns (JsonResponse);
  rpc ListTextfsmMappings(ListTextfsmMappingsRequest) returns (JsonResponse);
  rpc UpsertTextfsmMapping(UpsertTextfsmMappingRequest) returns (JsonResponse);
  rpc DeleteTextfsmMapping(DeleteTextfsmMappingRequest) returns (JsonResponse);
  rpc ExportTextfsmExcel(TextfsmExcelExportRequest) returns (BytesResponse);
  rpc ListCustomShowObjects(ListCustomShowObjectsRequest) returns (JsonResponse);
  rpc UpsertCustomShowObject(UpsertCustomShowObjectRequest) returns (JsonResponse);
  rpc DeleteCustomShowObject(DeleteCustomShowObjectRequest) returns (JsonResponse);
  rpc ListTaskRuns(ListTaskRunsRequest) returns (JsonResponse);
  rpc GetTaskRunDetail(GetTaskRunDetailRequest) returns (JsonResponse);
  rpc ListBackups(ListBackupsRequest) returns (JsonResponse);
  rpc CreateBackup(CreateBackupRequest) returns (JsonResponse);
  rpc RestoreBackup(RestoreBackupRequest) returns (JsonResponse);
  rpc DownloadBackup(DownloadBackupRequest) returns (BytesResponse);
  rpc ListBlacklistPatterns(ListBlacklistPatternsRequest) returns (JsonResponse);
  rpc AddBlacklistPattern(BlacklistPatternRequest) returns (JsonResponse);
  rpc DeleteBlacklistPattern(BlacklistPatternRequest) returns (JsonResponse);
  rpc CheckBlacklistCommand(CheckBlacklistCommandRequest) returns (JsonResponse);
}

message AgentInfoRequest {}

message AgentStatusRequest {}

message ListConnectionsRequest {}

message ConnectionMeta {
  string name               = 1;
  string host               = 2;
  uint32 port               = 3;
  string device_profile     = 4;
  bool   has_password       = 5;
  string linux_shell_flavor = 6;
}

message ListConnectionsResponse {
  repeated ConnectionMeta connections = 1;
}

message JsonResponse {
  string json = 1;
}

message BytesResponse {
  bytes  data         = 1;
  string filename     = 2;
  string content_type = 3;
}

message ConnectionRef {
  string          connection_name    = 1;
  string          host               = 2;
  string          username           = 3;
  string          password           = 4;
  optional uint32 port               = 5;
  string          enable_password    = 6;
  string          ssh_security       = 7;
  string          device_profile     = 8;
  string          linux_shell_flavor = 9;
  optional bool   enabled            = 10;
  repeated string labels             = 11;
  repeated string groups             = 12;
  string          vars_json          = 13;
  optional bool   enable_password_empty_enter = 14;
  string          template_dir       = 15;
}

message GetConnectionRequest {
  string name = 1;
}

message DeleteConnectionRequest {
  string name = 1;
}

message UpsertConnectionRequest {
  string        name          = 1;
  ConnectionRef connection    = 2;
  bool          save_password = 3;
}

message UpsertConnectionResponse {
  string        name         = 1;
  string        path         = 2;
  bool          has_password = 3;
  ConnectionRef connection   = 4;
}

message TestConnectionRequest {
  ConnectionRef connection = 1;
}

message TestConnectionResponse {
  bool   ok                 = 1;
  string host               = 2;
  uint32 port               = 3;
  string username           = 4;
  string ssh_security       = 5;
  string device_profile     = 6;
  string linux_shell_flavor = 7;
}

message GetConnectionHistoryRequest {
  string name  = 1;
  uint32 limit = 2;
}

message GetConnectionHistoryDetailRequest {
  string name = 1;
  string id   = 2;
}

message DeleteConnectionHistoryRequest {
  string name = 1;
  string id   = 2;
}

message ListInventoryGroupsRequest {}

message GetInventoryGroupRequest {
  string name = 1;
}

message UpsertInventoryGroupRequest {
  string name       = 1;
  repeated string hosts = 2;
  string vars_json  = 3;
  string description = 4;
}

message DeleteInventoryGroupRequest {
  string name = 1;
}

message ListInventoryLabelsRequest {}

message GetInventoryLabelRequest {
  string name = 1;
}

message UpsertInventoryLabelRequest {
  string name = 1;
  repeated string hosts = 2;
}

message DeleteInventoryLabelRequest {
  string name = 1;
}

message ImportConnectionsRequest {
  string file_name = 1;
  bytes  content   = 2;
}

message DownloadConnectionImportTemplateRequest {
  string lang = 1;
}

message ListTemplatesRequest {}

message TemplateMeta {
  string name          = 1;
  string kind          = 2;
  string source        = 3;
  string content_type  = 4;
  uint64 size_bytes    = 5;
  int64  created_at_ms = 6;
  int64  updated_at_ms = 7;
}

message ListTemplatesResponse {
  repeated TemplateMeta templates = 1;
}

message GetTemplateRequest {
  string name = 1;
}

message TemplateDetail {
  string name    = 1;
  string content = 2;
}

message CreateTemplateRequest {
  string name    = 1;
  string content = 2;
}

message UpdateTemplateRequest {
  string name    = 1;
  string content = 2;
}

message DeleteTemplateRequest {
  string name = 1;
}

message ListCommandFlowTemplatesRequest {}

message ListBuiltinCommandFlowTemplatesRequest {}

message CommandFlowTemplateMeta {
  string name          = 1;
  string kind          = 2;
  string source        = 3;
  string content_type  = 4;
  uint64 size_bytes    = 5;
  int64  created_at_ms = 6;
  int64  updated_at_ms = 7;
}

message ListCommandFlowTemplatesResponse {
  repeated CommandFlowTemplateMeta templates = 1;
}

message GetCommandFlowTemplateRequest {
  string name = 1;
}

message GetBuiltinCommandFlowTemplateRequest {
  string name = 1;
}

message CommandFlowTemplateVarField {
  string          name         = 1;
  string          label        = 2;
  optional string description  = 3;
  string          kind         = 4;
  bool            required     = 5;
  optional string placeholder  = 6;
  repeated string options      = 7;
  optional string default_json = 8;
  bool allow_empty = 9;
}

message CommandFlowTemplateDetail {
  string                               name        = 1;
  string                               content     = 2;
  repeated CommandFlowTemplateVarField vars_schema = 3;
}

message UpsertCommandFlowTemplateRequest {
  string name    = 1;
  string content = 2;
}

message DeleteCommandFlowTemplateRequest {
  string name = 1;
}

message DeleteCommandFlowTemplateResponse {
  bool ok = 1;
}

message ListTxBlockTemplatesRequest {}

message ListTxWorkflowTemplatesRequest {}

message ListOrchestrationTemplatesRequest {}

message ListDeviceProfilesRequest {}

message GetProfileRequest {
  string name = 1;
}

message DeleteProfileRequest {
  string name = 1;
}

message UpsertCustomProfileRequest {
  string name    = 1;
  string content = 2;
}

message DiagnoseProfileRequest {
  string name         = 1;
  string template_dir = 2;
}

message ListProfileModesRequest {
  string name = 1;
}

message BuiltinProfileMeta {
  string          name    = 1;
  repeated string aliases = 2;
  string          summary = 3;
}

message CustomProfileMeta {
  string name = 1;
  string path = 2;
}

message ListDeviceProfilesResponse {
  repeated BuiltinProfileMeta builtins = 1;
  repeated CustomProfileMeta  custom   = 2;
  repeated string             all      = 3;
}

message ListProfileModesResponse {
  string          name         = 1;
  string          default_mode = 2;
  repeated string modes        = 3;
}

message RenderTemplateRequest {
  string        template     = 1;
  string        vars_json    = 2;
  ConnectionRef connection   = 3;
  string        template_dir = 4;
}

message RenderTemplateResponse {
  string rendered_commands = 1;
}

message ListShowObjectsRequest {
  string device_profile   = 1;
  string textfsm_platform = 2;
}

message ShowObjectEntry {
  string          object                   = 1;
  string          command                  = 2;
  optional string mode                     = 3;
  optional string textfsm_mapping_command  = 4;
  string          source                   = 5;
  optional string textfsm_template_name    = 6;
}

message ListShowObjectsResponse {
  optional string           platform = 1;
  repeated ShowObjectEntry  objects  = 2;
}

message ExecuteShowRequest {
  string        task_id                = 1;
  string        object                 = 2;
  string        mode                   = 3;
  string        textfsm_platform       = 4;
  bool          no_parse               = 5;
  bool          textfsm_strict_errors  = 6;
  ConnectionRef connection             = 7;
  string        record_level           = 8;
}

message ExecuteShowResponse {
  string          object                    = 1;
  string          platform                  = 2;
  string          command                   = 3;
  string          mode                      = 4;
  string          source                    = 5;
  optional string textfsm_mapping_command   = 6;
  optional string textfsm_template_name     = 7;
  string          output                    = 8;
  optional int32  exit_code                 = 9;
  optional string parsed_output_json        = 10;
  optional string parse_error               = 11;
  optional string recording_jsonl           = 12;
  optional string result_summary_json       = 13;
}

message ExecuteShowBatchRequest {
  string          task_id               = 1;
  string          object                = 2;
  repeated string objects               = 3;
  string          mode                  = 4;
  string          textfsm_platform      = 5;
  bool            no_parse              = 6;
  bool            textfsm_strict_errors = 7;
  repeated string targets               = 8;
  repeated string groups                = 9;
  repeated string labels                = 10;
  string          record_level          = 11;
}

message ExecuteShowBatchResponse {
  string          object              = 1;
  repeated string targets             = 2;
  string          results_json        = 3;
  optional string result_summary_json = 4;
}

message ExecuteCommandRequest {
  string        task_id      = 1;
  string        command      = 2;
  string        mode         = 3;
  ConnectionRef connection   = 4;
  string        record_level = 5;
  string        textfsm_template       = 6;
  bool          parse_textfsm          = 7;
  string        textfsm_platform       = 8;
  string        textfsm_vendor         = 9;
  bool          textfsm_strict_errors  = 10;
}

message ExecuteTemplateRequest {
  string        task_id      = 1;
  string        template     = 2;
  string        vars_json    = 3;
  string        mode         = 4;
  bool          dry_run      = 5;
  ConnectionRef connection   = 6;
  string        record_level = 7;
  string        textfsm_template       = 8;
  bool          parse_textfsm          = 9;
  string        textfsm_platform       = 10;
  string        textfsm_vendor         = 11;
  bool          textfsm_strict_errors  = 12;
  string        template_dir           = 13;
}

message ExecuteTxBlockRequest {
  string        task_id                     = 1;
  string        tx_block_json               = 2;
  string        tx_block_template_name      = 3;
  string        tx_block_template_content   = 4;
  string        tx_block_template_vars_json = 5;
  bool          dry_run                     = 6;
  ConnectionRef connection                  = 7;
  string        record_level                = 8;
}

message ExecuteTxWorkflowRequest {
  string        task_id       = 1;
  string        workflow_json = 2;
  bool          dry_run       = 3;
  ConnectionRef connection    = 4;
  string        record_level  = 5;
  string        workflow_template_name      = 6;
  string        workflow_template_content   = 7;
  string        workflow_vars_json          = 8;
}

message ExecuteOrchestrationRequest {
  string task_id      = 1;
  string plan_json    = 2;
  string base_dir     = 3;
  bool   dry_run      = 4;
  string record_level = 5;
  string plan_template_name    = 6;
  string plan_template_content = 7;
  string plan_vars_json        = 8;
  ConnectionRef connection     = 9;
}

message AcceptedTaskResponse {
  bool   accepted  = 1;
  string task_id   = 2;
  string operation = 3;
  string status    = 4;
}

message ExecuteCommandResponse {
  string          output              = 1;
  optional string recording_jsonl     = 2;
  optional int32  exit_code           = 3;
  optional string result_summary_json = 4;
  optional string parsed_output_json  = 5;
  optional string parse_error         = 6;
}

message CommandExecutionResult {
  string          command   = 1;
  bool            success   = 2;
  optional string output    = 3;
  optional string error     = 4;
  optional int32  exit_code = 5;
  optional string parsed_output_json = 6;
  optional string parse_error        = 7;
}

message ExecuteTemplateResponse {
  string                          rendered_commands   = 1;
  repeated CommandExecutionResult executed            = 2;
  optional string                 recording_jsonl     = 3;
  optional string                 result_summary_json = 4;
}

message ExecuteCommandFlowRequest {
  optional string template_name = 1;
  optional string content       = 2;
  optional string vars_json     = 3;
  ConnectionRef   connection    = 4;
  string          record_level  = 5;
  optional string builtin_template_name = 6;
  string          textfsm_template      = 7;
  bool            parse_textfsm         = 8;
  string          textfsm_platform      = 9;
  string          textfsm_vendor        = 10;
  bool            textfsm_strict_errors = 11;
}

message ExecuteCommandFlowResponse {
  bool                            success             = 1;
  string                          template_name       = 2;
  repeated CommandExecutionResult outputs             = 3;
  optional string                 recording_jsonl     = 4;
  optional string                 result_summary_json = 5;
}

message ExecuteUploadRequest {
  string          local_path    = 1;
  string          remote_path   = 2;
  optional uint64 timeout_secs  = 3;
  optional uint32 buffer_size   = 4;
  bool            show_progress = 5;
  ConnectionRef   connection    = 6;
  string          record_level  = 7;
}

message ExecuteUploadResponse {
  bool            ok                  = 1;
  string          local_path          = 2;
  string          remote_path         = 3;
  optional string recording_jsonl     = 4;
  optional string result_summary_json = 5;
}

message ExecuteTxBlockResponse {
  string          tx_block_json       = 1;
  optional string tx_result_json      = 2;
  optional string recording_jsonl     = 3;
  optional string result_summary_json = 4;
}

message ExecuteTxWorkflowResponse {
  string          workflow_json        = 1;
  optional string tx_workflow_result_json = 2;
  optional string recording_jsonl      = 3;
  optional string result_summary_json  = 4;
}

message ExecuteOrchestrationResponse {
  string          plan_json                 = 1;
  string          inventory_json            = 2;
  optional string orchestration_result_json = 3;
  optional string result_summary_json       = 4;
}

message AgentInfoResponse {
  string          name                  = 1;
  string          version               = 2;
  repeated string capabilities          = 3;
  uint64          uptime_seconds        = 4;
  uint32          connections_count     = 5;
  uint32          templates_count       = 6;
  uint32          custom_profiles_count = 7;
  bool            managed               = 8;
}

message SystemInfo {
  string os       = 1;
  string arch     = 2;
  string hostname = 3;
}

message AgentStatusResponse {
  string     status            = 1;
  uint32     running_tasks     = 2;
  string     last_heartbeat_at = 3;
  string     registered_at     = 4;
  SystemInfo system            = 5;
}

message ProbeDevicesRequest {
  repeated string connections  = 1;
  uint32          timeout_secs = 2;
}

message DeviceProbeResult {
  string          name           = 1;
  string          host           = 2;
  uint32          port           = 3;
  string          device_profile = 4;
  bool            reachable      = 5;
  optional uint64 latency_ms     = 6;
  string          error          = 7;
}

message ProbeDevicesResponse {
  repeated DeviceProbeResult results           = 1;
  uint32                     total             = 2;
  uint32                     reachable_count   = 3;
  uint32                     unreachable_count = 4;
}

message ReplaySessionRequest {
  string jsonl   = 1;
  string command = 2;
  string mode    = 3;
  bool   list    = 4;
}

message ListTextfsmTemplatesRequest {}

message GetTextfsmTemplateRequest {
  string name = 1;
}

message UpsertTextfsmTemplateRequest {
  string name    = 1;
  string content = 2;
}

message DeleteTextfsmTemplateRequest {
  string name = 1;
}

message ListTextfsmMappingsRequest {
  string profile = 1;
}

message UpsertTextfsmMappingRequest {
  string device_profile = 1;
  string command        = 2;
  string template_name  = 3;
}

message DeleteTextfsmMappingRequest {
  string device_profile = 1;
  string command        = 2;
}

message TextfsmExcelExportSheet {
  string name               = 1;
  string parsed_output_json = 2;
}

message TextfsmExcelExportRequest {
  string filename = 1;
  repeated TextfsmExcelExportSheet sheets = 2;
  string sheet_name = 3;
  string parsed_output_json = 4;
}

message ListCustomShowObjectsRequest {
  string profile = 1;
}

message UpsertCustomShowObjectRequest {
  string device_profile           = 1;
  string object                   = 2;
  string command                  = 3;
  string mode                     = 4;
  string textfsm_mapping_command  = 5;
  string textfsm_template_name    = 6;
  optional bool enabled           = 7;
}

message DeleteCustomShowObjectRequest {
  string device_profile = 1;
  string object         = 2;
}

message ListTaskRunsRequest {
  uint32 limit     = 1;
  string operation = 2;
  string status    = 3;
}

message GetTaskRunDetailRequest {
  string task_id = 1;
}

message ListBackupsRequest {}

message CreateBackupRequest {
  string output = 1;
}

message RestoreBackupRequest {
  string archive = 1;
  bool   replace = 2;
}

message DownloadBackupRequest {
  string name = 1;
}

message ListBlacklistPatternsRequest {}

message BlacklistPatternRequest {
  string pattern = 1;
}

message CheckBlacklistCommandRequest {
  string command = 1;
}
