name = "cisco_like_copy"
description = "Generic interactive SCP/TFTP copy flow for Cisco-like CLIs."
stop_on_error = true
default_mode = "Enable"

[[vars]]
name = "command"
label = "Copy Command"
description = "Full device-side copy command, e.g. `copy scp: flash:/image.bin`."
required = true
placeholder = "copy scp: flash:/image.bin"

[[vars]]
name = "server_addr"
label = "Server Address"
description = "SCP/TFTP server reachable from the target device."
required = true
placeholder = "192.0.2.10"

[[vars]]
name = "remote_path"
label = "Remote Path"
description = "Response used for Source/Destination file name prompts."
required = true
placeholder = "/images/image.bin"

[[vars]]
name = "transfer_username"
label = "Transfer Username"
description = "Required when the protocol is SCP."
placeholder = "backup"

[[vars]]
name = "transfer_password"
label = "Transfer Password"
description = "Required when the protocol is SCP."
type = "secret"

[[vars]]
name = "overwrite_answer"
label = "Overwrite Answer"
description = "Response for overwrite confirmation prompts."
default = "y"

[[steps]]
timeout_secs = 300
command = "{{command}}"

[[steps.prompts]]
patterns = ["(?i)^Address or name of remote host.*\\?\\s*$"]
append_newline = true
record_input = true
response = "{{server_addr}}"

[[steps.prompts]]
patterns = ["(?i)^Source (?:file ?name|filename).*\\?\\s*$"]
append_newline = true
record_input = true
response = "{{remote_path}}"

[[steps.prompts]]
patterns = ["(?i)^Destination (?:file ?name|filename).*\\?\\s*$"]
append_newline = true
record_input = true
response = "{{remote_path}}"

[[steps.prompts]]
patterns = ["(?i)^Source username.*\\?\\s*$", "(?i)^Destination username.*\\?\\s*$"]
append_newline = true
record_input = true
response = "{{transfer_username}}"

[[steps.prompts]]
patterns = ["(?i)^.*password.*:\\s*$"]
append_newline = true
record_input = false
response = "{{transfer_password}}"

[[steps.prompts]]
patterns = ["(?i)^.*\\[confirm\\]\\s*$"]
append_newline = true
record_input = false
response = ""

[[steps.prompts]]
patterns = ["(?i)^.*(?:overwrite|over write).*\\[(?:y/n|yes/no)\\].*$"]
append_newline = true
record_input = false
response = "{{overwrite_answer}}"
