[book]
title = "rauto Tutorial"
authors = ["demohiiiii"]
language = "en"
multilingual = true
src = "src"
description = "A practical rauto tutorial covering CLI, Web, Agent, templates, transactions, and orchestration."

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/demohiiiii/rauto"
edit-url-template = "https://github.com/demohiiiii/rauto/edit/main/{path}"
